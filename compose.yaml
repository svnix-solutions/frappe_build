name: frappe

x-app-defaults: &app-defaults
  image: ${FRAPPE_IMAGE:-frappe-app:latest}
  restart: unless-stopped
  volumes:
    - sites:/home/frappe/frappe-bench/sites
    - logs:/home/frappe/frappe-bench/logs
  ulimits:
    nofile:
      soft: 262144
      hard: 262144
  # Makes the host reachable as `host.docker.internal` from inside containers
  # on Linux (Docker Desktop already provides this natively on macOS/Windows).
  # Used to reach the DB stack on the same host without a shared docker network.
  extra_hosts:
    - "host.docker.internal:host-gateway"
  environment: &app-env
    FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME_HEADER:-erp.example.com}
    DB_HOST: ${DB_HOST:-host.docker.internal}
    DB_PORT: ${DB_PORT:-3306}
    REDIS_CACHE: redis-cache:6379
    REDIS_QUEUE: redis-queue:6379
    SOCKETIO_PORT: "9000"
  depends_on:
    configurator:
      condition: service_completed_successfully
    redis-cache:
      condition: service_started
    redis-queue:
      condition: service_started

services:
  configurator:
    <<: *app-defaults
    entrypoint: ["bash", "-c"]
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    restart: "no"
    depends_on:
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started

  backend:
    <<: *app-defaults
    command:
      - /home/frappe/frappe-bench/env/bin/gunicorn
      - --chdir=/home/frappe/frappe-bench/sites
      - --bind=0.0.0.0:8000
      - --workers=4
      - --threads=4
      - --worker-class=gthread
      - --worker-tmp-dir=/dev/shm
      - --timeout=180
      - --max-requests=5000
      - --max-requests-jitter=500
      - --preload
      - frappe.app:application

  websocket:
    <<: *app-defaults
    command: node /home/frappe/frappe-bench/apps/frappe/socketio.js

  frontend:
    <<: *app-defaults
    command: /usr/local/bin/nginx-entrypoint.sh
    environment:
      <<: *app-env
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      # Trust X-Forwarded-* from Caddy on the shared docker network.
      UPSTREAM_REAL_IP_ADDRESS: "172.16.0.0/12"
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: "180"
      CLIENT_MAX_BODY_SIZE: 50m
    depends_on:
      backend:
        condition: service_started
      websocket:
        condition: service_started
    networks:
      - default
      - caddy
    labels:
      caddy: ${PUBLIC_DOMAINS:?PUBLIC_DOMAINS is required (space-separated, e.g. \"erp.example.com www.erp.example.com\")}
      caddy.reverse_proxy: "{{upstreams 8080}}"
      caddy.encode: gzip
      caddy.header.Strict-Transport-Security: '"max-age=31536000;"'

  scheduler:
    <<: *app-defaults
    command: bench schedule

  queue-short:
    <<: *app-defaults
    command: bench worker --queue short,default

  queue-long:
    <<: *app-defaults
    command: bench worker --queue long,default,short

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-cache-data:/data

  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data

volumes:
  sites:
  logs:
  redis-cache-data:
  redis-queue-data:

networks:
  # Network shared with the caddy-docker-proxy stack so Caddy can reach the
  # frontend container. Create it once on the host with:
  #   docker network create caddy
  caddy:
    external: true
    name: ${CADDY_NETWORK:-caddy}
